name: Dependabot Auto-merge

# Approves Dependabot's pull requests and turns on GitHub's native auto-merge,
# so they merge into `main` automatically once the required CI checks are green.
# Covers patch, minor AND major updates — a red build keeps the PR open.
#
# Requirements (one-time, in the repo settings):
#   • Settings → General → "Allow auto-merge" must be enabled.
#   • A branch protection rule on `main` requiring the CI checks to pass.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve the pull request
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
