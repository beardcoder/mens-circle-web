name: Renovate Auto-merge

# Approves Renovate's pull requests and turns on GitHub's native auto-merge, so
# they merge into `main` automatically once the required CI checks are green.
# Works for patch, minor AND major updates — gating is done by branch
# protection + the CI workflow, not by withholding the merge here.
#
# Requirements (one-time, in the repo settings):
#   • Settings → General → "Allow auto-merge" must be enabled.
#   • A branch protection rule on `main` requiring the CI checks to pass, so a
#     red build blocks the queued auto-merge.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    # Only act on Renovate's own PRs.
    if: >-
      ${{ github.actor == 'renovate[bot]' || github.actor == 'renovate' }}
    steps:
      - name: Approve the pull request
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
