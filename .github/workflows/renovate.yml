name: Renovate

# Self-hosted Renovate runner. Use this if the Mend Renovate GitHub App is NOT
# installed on the repo. It reads ./renovate.json and opens/updates dependency
# PRs on a schedule (and on demand via "Run workflow").
#
# Requires a repository secret `RENOVATE_TOKEN`: a fine-grained PAT (or classic
# token with `repo` + `workflow` scope) that may open PRs and update workflow
# files. The default GITHUB_TOKEN cannot create branches that touch workflows.
#
# If you instead use the hosted Renovate App, you can delete this file —
# renovate.json and the auto-merge workflow are all that's needed.

on:
  schedule:
    - cron: '0 4 * * 1' # Mondays, 04:00 UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        type: choice
        default: 'info'
        options:
          - debug
          - info
          - warn

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
