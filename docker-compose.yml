# ===========================================================================
# M√§nnerkreis Niederbayern/ Straubing ‚Äî full stack in one Compose (Coolify).
#
#   web          Astro (Bun) + PocketBase + nginx in one image (root Dockerfile).
#                nginx is the public edge and routes the SAME domain by path:
#                /api¬∑/_¬∑/newsletter ‚Üí PocketBase, everything else ‚Üí Astro.
#                That same-origin path split is why these stay co-located.
#   listmonk     Newsletter (subscribers, double opt-in, campaigns).
#   listmonk-db  PostgreSQL for listmonk (required; listmonk has no SQLite).
#
# Uses Coolify "magic" variables:
#   SERVICE_FQDN_<svc>_<port>  ‚Üí Coolify generates a domain + routes the port.
#   SERVICE_URL_<svc>          ‚Üí the full https:// URL (for canonical/links).
#   SERVICE_USER_*/PASSWORD_*  ‚Üí auto-generated, persisted credentials.
# Assign your real domains to `web` (8090) and `listmonk` (9000) in the Coolify
# UI. Non-magic secrets (SMTP, listmonk API token, PB admin) are set as normal
# Coolify env vars ‚Äî see .env.example.
# ===========================================================================
name: mens-circle

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Canonical URL baked into the build (sitemap/OG). Falls back if the
        # magic URL isn't available at build time.
        PUBLIC_SITE_URL: ${SERVICE_URL_WEB:-https://mens-circle.de}
    restart: unless-stopped
    environment:
      # Coolify generates + routes the web domain to nginx on :8090.
      - SERVICE_FQDN_WEB_8090
      # PocketBase hooks (config.pb.js) read these via $os.getenv().
      - APP_URL=${SERVICE_URL_WEB}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-hallo@mens-circle.de}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-M√§nnerkreis Niederbayern/ Straubing}
      - MAIL_ADMIN_ADDRESS=${MAIL_ADMIN_ADDRESS:-hallo@mens-circle.de}
      - MAIL_ADMIN_NAME=${MAIL_ADMIN_NAME:-M√§nnerkreis Admin}
      # SMTP for transactional EVENT mails (seeded into PocketBase on boot).
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_TLS=${SMTP_TLS:-true}
      # First-run PocketBase superuser (optional).
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
      # Newsletter ‚Üí listmonk, server-side over the internal network.
      - LISTMONK_URL=http://listmonk:9000
      - LISTMONK_API_USER=${LISTMONK_API_USER}
      - LISTMONK_API_TOKEN=${LISTMONK_API_TOKEN}
      - LISTMONK_LIST_IDS=${LISTMONK_LIST_IDS}
    volumes:
      - pb-data:/pb/pb_data
    depends_on:
      - listmonk

  listmonk:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    depends_on:
      listmonk-db:
        condition: service_healthy
    environment:
      # Coolify generates + routes the listmonk domain to :9000.
      - SERVICE_FQDN_LISTMONK_9000
      - TZ=Europe/Berlin
      - LISTMONK_app__address=0.0.0.0:9000
      # Public URL listmonk uses in links (opt-in / unsubscribe).
      - LISTMONK_app__root_url=${SERVICE_URL_LISTMONK}
      - LISTMONK_db__host=listmonk-db
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=${SERVICE_USER_POSTGRES}
      - LISTMONK_db__password=${SERVICE_PASSWORD_POSTGRES}
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__ssl_mode=disable
      # Super admin, created on first boot.
      - LISTMONK_ADMIN_USER=${SERVICE_USER_LISTMONKADMIN}
      - LISTMONK_ADMIN_PASSWORD=${SERVICE_PASSWORD_LISTMONKADMIN}
    command:
      - sh
      - -c
      - "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"
    volumes:
      - listmonk-uploads:/listmonk/uploads:rw

  listmonk-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=listmonk
    volumes:
      - listmonk-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pb-data:
  listmonk-uploads:
  listmonk-db:
