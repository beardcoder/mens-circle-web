name: mens-circle

services:
  web:
    build:
      context: .
      args:
        PUBLIC_SITE_URL: ${SERVICE_URL_WEB:-https://mens-circle.de}
    restart: unless-stopped
    environment:
      APP_URL: ${SERVICE_URL_WEB}
      DATABASE_PATH: /data/mens-circle.db
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hallo@mens-circle.de}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Männerkreis Niederbayern/ Straubing}
      MAIL_ADMIN_ADDRESS: ${MAIL_ADMIN_ADDRESS:-hallo@mens-circle.de}
      MAIL_ADMIN_NAME: ${MAIL_ADMIN_NAME:-Männerkreis Admin}
      # Admin UI login (single operator) + session cookie secret.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      # listmonk: newsletter, per-event lists + transactional email.
      LISTMONK_URL: http://listmonk:9000
      LISTMONK_API_USER: ${LISTMONK_API_USER}
      LISTMONK_API_TOKEN: ${LISTMONK_API_TOKEN}
      LISTMONK_LIST_IDS: ${LISTMONK_LIST_IDS}
      # Numeric IDs of the listmonk transactional templates.
      LISTMONK_TX_REGISTRATION_CONFIRMATION: ${LISTMONK_TX_REGISTRATION_CONFIRMATION}
      LISTMONK_TX_WAITLIST_CONFIRMATION: ${LISTMONK_TX_WAITLIST_CONFIRMATION}
      LISTMONK_TX_ADMIN_NOTIFICATION: ${LISTMONK_TX_ADMIN_NOTIFICATION}
      LISTMONK_TX_WAITLIST_PROMOTION: ${LISTMONK_TX_WAITLIST_PROMOTION}
      LISTMONK_TX_EVENT_REMINDER: ${LISTMONK_TX_EVENT_REMINDER}
      LISTMONK_TX_EVENT_MESSAGE: ${LISTMONK_TX_EVENT_MESSAGE}
      # SQLite → S3 backup (scripts/backup-db.ts), run on a schedule via
      # `docker exec <web> bun run scripts/backup-db.ts`. All optional — without
      # a bucket the script just exits.
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-mens-circle-db}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-auto}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - app-data:/data
    depends_on:
      - listmonk
    healthcheck:
      # wget, not curl — curl isn't installed in the Bun runtime image. /health is
      # answered directly by the Bun edge (see adapter/server.mjs), no SSR render.
      # 127.0.0.1 (not localhost) — Bun binds IPv4 only; localhost may hit ::1.
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:8090/health || exit 1']
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - 'caddy_0.import=static_cache_headers'
      - 'caddy_1.import=web_optimizations'

  listmonk:
    # Custom image that bakes the branded system email-templates into the
    # container (see listmonk/Dockerfile). We intentionally do NOT bind-mount
    # ./listmonk/static at runtime: repo-relative bind mounts are fragile on
    # some hosts (e.g. Coolify) and a missing mount silently falls back to
    # listmonk's embedded English defaults.
    build:
      context: ./listmonk
    image: mens-circle-listmonk:latest
    restart: unless-stopped
    depends_on:
      listmonk-db:
        condition: service_healthy
    environment:
      TZ: Europe/Berlin
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_app__root_url: ${SERVICE_URL_LISTMONK}
      LISTMONK_db__host: listmonk-db
      LISTMONK_db__port: 5432
      LISTMONK_db__user: ${SERVICE_USER_POSTGRES}
      LISTMONK_db__password: ${SERVICE_PASSWORD_POSTGRES}
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
      LISTMONK_ADMIN_USER: ${SERVICE_USER_LISTMONKADMIN}
      LISTMONK_ADMIN_PASSWORD: ${SERVICE_PASSWORD_LISTMONKADMIN}
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/api/ping || exit 1']
      start_period: 120s
      interval: 15s
      timeout: 5s
      retries: 12
    command:
      - sh
      - -c
      - "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --static-dir=/listmonk/static --config ''"
    volumes:
      - listmonk-uploads:/listmonk/uploads:rw

  listmonk-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: listmonk
    volumes:
      - listmonk-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  app-data:
  listmonk-uploads:
  listmonk-db:
