# ─────────────────────────────────────────────────────────────────────────────
# Männerkreis — edge config (nginx).
#
# nginx is the single public entrypoint inside the container. It routes between
# two loopback upstreams and serves the build's static assets directly:
#
#   Coolify (TLS) ──http──▶ nginx :8090 ─┬─ static /app/dist/client (assets, …)
#                                         ├─ /api · /_ · /newsletter → PocketBase
#                                         └─ everything else         → Astro (Bun)
#
# Hashed assets are served straight off disk with immutable caching; HTML and
# all SSR routes are proxied to the Astro/Bun server. PocketBase (REST API,
# admin UI, newsletter-unsubscribe page) is proxied on its own paths. Both app
# processes listen on loopback only. Compression is handled by Coolify's edge.
# ─────────────────────────────────────────────────────────────────────────────

user  www-data;
worker_processes  1;
daemon  off;
pid  /tmp/nginx.pid;
error_log  /dev/stderr  warn;

events {
	worker_connections  1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;

	access_log    /dev/stdout;
	sendfile      on;
	tcp_nopush    on;
	server_tokens off;
	types_hash_max_size 2048;

	# Cache open file descriptors/metadata for the statically served files
	# (assets + prerendered HTML) — fewer stat() syscalls, faster repeat hits.
	open_file_cache          max=2000 inactive=60s;
	open_file_cache_valid    60s;
	open_file_cache_min_uses 1;
	open_file_cache_errors   off;

	# Cache-Control by asset class (first matching regex wins). `default`
	# guarantees every static response carries a Cache-Control header.
	map $uri $cache_control {
		default                                       "public, max-age=0, must-revalidate";
		~*^/assets/                                   "public, max-age=31536000, immutable";
		~*\.(?:woff2?|ttf|otf|eot)$                   "public, max-age=31536000, immutable";
		~*\.(?:avif|webp|jxl|png|jpe?g|gif|svg|ico)$  "public, max-age=604800";
		~*\.xml$                                      "public, max-age=86400";
		~*^/(?:manifest\.(?:json|webmanifest)|robots\.txt|browserconfig\.xml)$  "public, max-age=86400";
	}

	# `keepalive` pools upstream connections (with HTTP/1.1 + Connection "" below)
	# so proxied requests reuse sockets instead of opening one per request.
	upstream pocketbase {
		server 127.0.0.1:8091;
		keepalive 16;
	}
	upstream astro {
		server 127.0.0.1:4321;
		keepalive 16;
	}

	# Shared proxy settings (inherited by the proxy locations below).
	proxy_http_version 1.1;
	proxy_set_header Host              $host;
	proxy_set_header X-Real-IP         $remote_addr;
	proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Connection        "";

	server {
		listen 8090;
		root   /app/dist/client;

		# ── Dynamic paths owned by PocketBase ──────────────────────────────
		# API + admin UI + the newsletter-unsubscribe HTML route. Bare /events
		# (Astro's redirect to /event) is NOT matched here — it goes to Astro.
		location /api/        { proxy_pass http://pocketbase; proxy_buffering off; }
		location = /_         { proxy_pass http://pocketbase; }
		location /_/          { proxy_pass http://pocketbase; }
		location /newsletter/ { proxy_pass http://pocketbase; }

		# Home is on-demand (SSR) — handle it explicitly so try_files below
		# never tries to serve the root directory as a static index.
		location = / {
			proxy_pass http://astro;
		}

		# ── Static files + prerendered HTML first, otherwise SSR ───────────
		location / {
			# Security + cache headers for the statically served responses. (In
			# nginx an `add_header` inside a location REPLACES the inherited
			# ones, so they live together; @astro responses keep Astro's own.)
			add_header X-Content-Type-Options "nosniff"                        always;
			add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
			add_header X-Frame-Options        "SAMEORIGIN"                      always;
			add_header Cache-Control          $cache_control                    always;

			# Serve straight off disk: exact files (hashed assets, fonts,
			# favicons, robots.txt, sitemaps, manifest) and prerendered pages
			# (/impressum/index.html, …). Everything else — the SSR routes
			# (/event, /event/{slug}) — is handed to the Astro/Bun server.
			try_files $uri $uri/index.html @astro;
		}

		location @astro {
			proxy_pass http://astro;
		}
	}
}
