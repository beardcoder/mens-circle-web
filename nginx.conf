# ─────────────────────────────────────────────────────────────────────────────
# Männerkreis — edge config (nginx).
#
# nginx is the single entrypoint inside the container. It serves the pre-built
# static Astro site DIRECTLY (full control over Cache-Control + security
# headers) and reverse-proxies only the dynamic paths to PocketBase, which
# listens on a loopback-only port. Tiny footprint: one worker, no on-the-fly
# compression (Coolify's edge proxy handles that).
#
#   Coolify (TLS) ──http──▶ nginx :8090 ─┬─ static /srv/site  (Astro dist)
#                                         └─ proxy  127.0.0.1:8091  (PocketBase)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  1;
daemon  off;
pid  /tmp/nginx.pid;
error_log  /dev/stderr  warn;

events {
	worker_connections  1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;

	access_log    /dev/stdout;
	sendfile      on;
	tcp_nopush    on;
	server_tokens off;
	types_hash_max_size 2048;

	# Cache-Control by asset class. First matching regex wins; `default`
	# guarantees every response carries a Cache-Control header (so e.g. avif is
	# never served without one). Content-hashed files under /assets/ — including
	# Astro-optimised avif/webp — are immutable; other images get a 7-day TTL.
	map $uri $cache_control {
		default                                       "public, max-age=0, must-revalidate";
		~*^/assets/                                   "public, max-age=31536000, immutable";
		~*\.(?:woff2?|ttf|otf|eot)$                   "public, max-age=31536000, immutable";
		~*\.(?:avif|webp|jxl|png|jpe?g|gif|svg|ico)$  "public, max-age=604800";
		~*\.xml$                                      "public, max-age=86400";
		~*^/(?:manifest\.(?:json|webmanifest)|robots\.txt|browserconfig\.xml)$  "public, max-age=86400";
	}

	upstream pocketbase {
		server 127.0.0.1:8091;
	}

	# Shared proxy settings (inherited by the proxy locations below).
	proxy_http_version 1.1;
	proxy_set_header Host              $host;
	proxy_set_header X-Real-IP         $remote_addr;
	proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Connection        "";

	server {
		listen 8090;
		root   /srv/site;
		index  index.html;

		# ── Dynamic paths owned by PocketBase ──────────────────────────────
		# API + admin UI + the pb_hooks HTML routes (newsletter unsubscribe,
		# /events/{slug} → /event/{slug}). Bare /events (Astro's static
		# redirect to /event) is NOT matched here, so it stays served from disk.
		location /api/        { proxy_pass http://pocketbase; proxy_buffering off; }
		location = /_         { proxy_pass http://pocketbase; }
		location /_/          { proxy_pass http://pocketbase; }
		location /newsletter/ { proxy_pass http://pocketbase; }
		location /events/     { proxy_pass http://pocketbase; }

		# ── Static Astro site ──────────────────────────────────────────────
		location / {
			# Security + cache headers. They are grouped here because in nginx
			# an `add_header` inside a location REPLACES (not extends) the ones
			# inherited from an outer scope — so they must live together.
			add_header X-Content-Type-Options "nosniff"                        always;
			add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
			add_header X-Frame-Options        "SAMEORIGIN"                      always;
			add_header Cache-Control          $cache_control                    always;

			# Astro builds clean URLs as directory indexes (/event/index.html).
			try_files $uri $uri/index.html $uri.html =404;
		}
	}
}
