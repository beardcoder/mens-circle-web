{{define "body"}}
<div style="font-size:15px;line-height:1.7;color:#3a342c;">{{.content|raw}}</div>

<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="margin:32px 0;">
  <tr><td style="height:1px;background-color:#c4b49a;font-size:0;line-height:0;">&nbsp;</td></tr>
</table>

<p style="font-size:15px;line-height:1.7;color:#3a342c;margin:0 0 16px;">Herzliche Grüße,<br /><strong>{{.siteName}}</strong></p>

<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="margin-top:28px;">
  <tr><td style="border-top:1px solid #e3dccb;padding-top:16px;font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.6;color:#8a7c66;">Du erhältst diese E-Mail, weil du dich für den Newsletter von {{.siteName}} angemeldet hast. <a href="{{.unsubUrl}}" style="color:#b86f52;">Vom Newsletter abmelden</a></td></tr>
</table>
{{end}}
